<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách thực đơn</title>
</head>
<body>
<h1>Danh sách món ăn</h1>
<div th:if="${dishes == null or #lists.isEmpty(dishes)}">
    <p style="color: gray;">
        Hiện tại nhà hàng đang cập nhật thực đơn, vui lòng quay lại sau
    </p>
</div>
<table border="1" th:unless="${dishes == null or #lists.isEmpty(dishes)}">
    <tr>
        <th>ID</th>
        <th>Tên món</th>
        <th>Giá</th>
        <th>Trạng thái</th>
    </tr>
    <tr th:each="dish : ${dishes}">
        <td th:text="${dish.id}"></td>
        <td th:text="${dish.name}"></td>
        <td th:text="${dish.price}"></td>
        <td th:if="${dish.available}" style="color: green;">
            Còn hàng
        </td>
        <td th:unless="${dish.available}" style="color: red;">
            Hết hàng
        </td>
        <td>
            <a th:href="@{|/bai03/edit/${dish.id}|}">Chỉnh sửa</a>
        </td>
    </tr>
</table>
</body>
</html>
